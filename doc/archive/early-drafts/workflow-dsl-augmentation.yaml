# ═══════════════════════════════════════════════════════════════════════════════
# Witness Workflow DSL — Runtime Augmentation Protocol
# ═══════════════════════════════════════════════════════════════════════════════
# How agents dynamically extend running workflows with discovered subtasks.
# ═══════════════════════════════════════════════════════════════════════════════


# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 1. CONCEPT                                                                  │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# Runtime Augmentation allows agents to inject new nodes into a running workflow
# DAG when they discover subtasks that weren't known at definition time.
#
# Example: A "Run Tests" node starts executing. The agent discovers 12 test
# suites across the project. It injects 12 child nodes (one per suite) that
# run in parallel, then the parent join waits for all children.
#
# Three workflow modes:
#   1. STATIC    — Fully defined in YAML. No augmentation possible.
#   2. DETECTED  — Entirely inferred from observed AgentRun topology at runtime.
#   3. HYBRID    — YAML template with augmentable nodes that agents fill in.


# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 2. YAML SYNTAX FOR AUGMENTATION POINTS                                     │
# └─────────────────────────────────────────────────────────────────────────────┘

# ── Minimal augmentable node ──────────────────────────────────────────────────
# Mark a node as expandable:
#
#   - id: discover-tests
#     type: agent_task
#     label: "Discover & Run Tests"
#     augmentable: true                    # <-- enables runtime injection
#     injection_rules:
#       max_children: 20                   # Max nodes that can be injected
#       allowed_types: [agent_task]        # Only agent tasks allowed
#       auto_approve: true                 # No human gate needed
#       cost_budget_usd: 10.00             # Total cost cap for all children
#
# ── Full injection_rules specification ────────────────────────────────────────
#
#   injection_rules:
#     max_children: integer                # Hard cap on injected nodes (required)
#     allowed_types:                       # Node types permitted (required)
#       - agent_task
#       - gate
#       - wait
#     auto_approve: boolean                # If false, injections are held for approval
#     requires_approval_from: string       # Who approves: username or node_id
#     allowed_sources: [string]            # Which agent sources can inject
#     cost_budget_usd: number              # Cumulative cost limit for children
#     inherit_timeout: boolean             # Children inherit parent's remaining timeout
#     inherit_config: boolean              # Children inherit parent's agent config
#     naming_pattern: string               # ID pattern: "test-suite-{index}"
#     join_mode: enum                      # How parent waits: 'all' | 'any' | 'n_of_m'
#     join_n: integer                      # For n_of_m: minimum required completions
#     on_child_failure: enum               # 'fail_parent' | 'continue' | 'skip_remaining'
#     propagate_outputs: boolean           # Merge child outputs into parent outputs
#     output_merge_strategy: enum          # 'array' | 'object' | 'last_wins'


# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 3. AUGMENTATION PROTOCOL (API)                                              │
# └─────────────────────────────────────────────────────────────────────────────┘

# ── FastAPI Endpoint: Inject Nodes ────────────────────────────────────────────
#
# POST /api/v1/workflows/{workflow_instance_id}/nodes/{parent_node_id}/augment
#
# Request Body (JSON, maps to AugmentationRequest):
# ```json
# {
#   "nodes": [
#     {
#       "id": "test-suite-auth",
#       "type": "agent_task",
#       "label": "Auth Test Suite",
#       "config": {
#         "prompt": "Run auth test suite: pytest tests/auth/ -v",
#         "tools_allowed": ["bash", "read"],
#         "max_turns": 10,
#         "cost_limit_usd": 1.00
#       },
#       "outputs": {
#         "passed": { "type": "boolean" },
#         "test_count": { "type": "number" }
#       },
#       "timeout": "10m"
#     },
#     {
#       "id": "test-suite-payments",
#       "type": "agent_task",
#       "label": "Payments Test Suite",
#       "config": {
#         "prompt": "Run payments tests: pytest tests/payments/ -v",
#         "tools_allowed": ["bash", "read"],
#         "max_turns": 10,
#         "cost_limit_usd": 1.00
#       }
#     }
#   ],
#   "edges": [
#     {
#       "from": "test-suite-auth",
#       "to": "test-suite-payments",
#       "type": "depends_on"
#     }
#   ],
#   "reason": "Discovered 2 test suites in project structure",
#   "source_run_id": "claude-code:session-abc123"
# }
# ```
#
# Response (201 Created):
# ```json
# {
#   "augmentation_id": "aug_7f3k2m",
#   "status": "applied",           // or "pending_approval"
#   "nodes_added": ["test-suite-auth", "test-suite-payments"],
#   "edges_added": [{"from": "test-suite-auth", "to": "test-suite-payments"}],
#   "remaining_budget_usd": 8.00,
#   "remaining_slots": 18
# }
# ```
#
# ── FastAPI Endpoint: Query Augmentations ─────────────────────────────────────
#
# GET /api/v1/workflows/{workflow_instance_id}/augmentations
#
# Response: list of all augmentations applied to this instance, with metadata.
#
# ── FastAPI Endpoint: Approve Pending Augmentation ────────────────────────────
#
# POST /api/v1/workflows/{workflow_instance_id}/augmentations/{aug_id}/approve
# POST /api/v1/workflows/{workflow_instance_id}/augmentations/{aug_id}/reject


# ┌─────────────────────────────────────────────────────────────────────────────┐
