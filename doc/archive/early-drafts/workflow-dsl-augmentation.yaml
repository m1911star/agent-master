# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 6. CONFLICT RESOLUTION                                                      │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ── Circular Dependency Detection ─────────────────────────────────────────────
# Before applying any augmentation, the engine performs a topological sort on
# the proposed DAG (existing nodes + new nodes + new edges). If a cycle is
# detected, the augmentation is rejected with:
#   { status: "rejected", rejection_reason: "circular_dependency: A→B→C→A" }
#
# ── Conflicting Edges ─────────────────────────────────────────────────────────
# If an injected node declares depends_on a node that has already completed:
#   - If the dependency completed successfully: injected node starts immediately
#   - If the dependency failed/was skipped: injected node inherits that status
#
# ── Concurrent Augmentation ───────────────────────────────────────────────────
# Multiple agents augmenting the same parent node simultaneously:
#   - Each augmentation is processed atomically (sequential within parent)
#   - IDs must be unique; collision → rejection with "duplicate_node_id"
#   - Budget is checked-and-decremented atomically
#   - Slot count is checked-and-decremented atomically
#
# ── Name Collision ────────────────────────────────────────────────────────────
# Augmented node ID must not match any existing node ID in the workflow.
# If collision: reject with reason "node_id_exists: {id}"


# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 7. GOVERNANCE & AUDIT                                                       │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ── Auto-Approve Rules ────────────────────────────────────────────────────────
# An augmentation is auto-approved when ALL of:
#   1. injection_rules.auto_approve == true
#   2. Total cost of new nodes <= remaining cost_budget_usd
#   3. Count of new nodes <= remaining max_children slots
#   4. All new node types ∈ injection_rules.allowed_types
#   5. Source agent ∈ injection_rules.allowed_sources (if specified)
#
# If any condition fails → status becomes "pending_approval"
#
# ── Human Gate ────────────────────────────────────────────────────────────────
# When auto_approve is false, or when auto-approve conditions fail:
#   - The augmentation enters "pending_approval" state
#   - A notification is sent to requires_approval_from (user or node assignee)
#   - The parent node enters "waiting_approval" state
#   - UI shows the proposed nodes with a diff view
#   - Approver can: approve, reject, or modify-then-approve
#
# ── Audit Trail ───────────────────────────────────────────────────────────────
# Every augmentation (applied or rejected) is recorded:
#
# ```typescript
# interface AugmentationAuditEntry {
#   augmentation_id: string;
#   workflow_instance_id: string;
#   parent_node_id: string;
#   timestamp: number;
#   action: 'applied' | 'rejected' | 'approved' | 'auto_approved';
#   actor: string;                 // Agent run ID or human username
#   reason: string;                // Why the agent wanted to augment
#   nodes_proposed: AugmentedNodeDef[];
#   edges_proposed: AugmentedEdge[];
#   rejection_reason?: string;
#   cost_at_time: number;          // Budget consumed so far
#   approval_comment?: string;
# }
# ```


# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 8. REAL-TIME VISUALIZATION                                                  │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ── WebSocket Events ──────────────────────────────────────────────────────────
# The frontend subscribes to workflow instance events via WebSocket:
#
# ws://localhost:8080/api/v1/workflows/{instance_id}/events
#
# Event types streamed:
#   - node_state_changed:    { node_id, old_state, new_state, timestamp }
#   - workflow_augmented:    { augmentation_id, parent_node_id, nodes, edges }
#   - node_output_updated:   { node_id, outputs }
#   - workflow_state_changed: { old_state, new_state }
#
# ── UI Rendering of Augmented Nodes ──────────────────────────────────────────
# Augmented nodes are visually distinguished:
#   - Dashed border (vs solid for static nodes)
#   - "⚡ Injected" badge
#   - Grouped under parent node (collapsible cluster)
#   - Subtle animation on injection (fade-in + edge draw)
#   - Hover tooltip shows: injected_by, injected_at, augmentation_id
#
# ── Diff View ─────────────────────────────────────────────────────────────────
# "Template vs Actual" comparison:
#   - Left: original YAML template (static nodes only)
#   - Right: runtime state (static + augmented nodes)
#   - Highlighted: augmented nodes in accent color
#   - Metrics: "Template: 5 nodes → Runtime: 17 nodes (+12 discovered)"
#
# ── Critical Path Highlighting ────────────────────────────────────────────────
# Real-time critical path computation updates as nodes are injected:
#   - Longest path through DAG highlighted in red
#   - Bottleneck nodes (on critical path + longest duration) pulsed
#   - Parallel branches shown with slack time annotations


# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 9. COMPLETE AUGMENTATION FLOW EXAMPLE                                       │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# Scenario: "Run Tests" node in a deploy workflow.
# Agent starts → reads project → finds 4 test suites → injects 4 child nodes.
#
# Step 1: Workflow starts, "run-tests" node becomes running
# Step 2: Agent (bound to run-tests) reads the project structure
# Step 3: Agent calls the augmentation API:
#
#   POST /api/v1/workflows/wf-inst-001/nodes/run-tests/augment
#   {
#     "nodes": [
#       {"id": "test-auth",     "type": "agent_task", "label": "Auth Tests",     "config": {"prompt": "pytest tests/auth/"}},
#       {"id": "test-payments", "type": "agent_task", "label": "Payment Tests",  "config": {"prompt": "pytest tests/payments/"}},
#       {"id": "test-users",    "type": "agent_task", "label": "User Tests",     "config": {"prompt": "pytest tests/users/"}},
#       {"id": "test-api",      "type": "agent_task", "label": "API Tests",      "config": {"prompt": "pytest tests/api/"}}
#     ],
#     "reason": "Discovered 4 test directories in project",
#     "source_run_id": "claude-code:session-run-tests"
#   }
#
# Step 4: Engine validates (types allowed, budget ok, no cycles) → auto-approves
# Step 5: 4 child nodes created in "ready" state
# Step 6: WebSocket broadcasts workflow_augmented event
# Step 7: UI animates 4 new nodes appearing under "run-tests"
# Step 8: Scheduler picks up ready nodes, spawns 4 parallel agent runs
# Step 9: As each completes, parent node tracks progress
# Step 10: When all 4 complete (join_mode: all), parent "run-tests" completes
# Step 11: Downstream nodes (quality-gate) become ready
#
# The parent node's outputs automatically include merged child outputs:
#   outputs.children_results: [
#     {id: "test-auth", passed: true, count: 45},
#     {id: "test-payments", passed: true, count: 23},
#     {id: "test-users", passed: false, count: 38, failures: [...]},
#     {id: "test-api", passed: true, count: 67}
#   ]


# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 10. MAPPING TopologyEdge TO WORKFLOW NODES                                  │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# When the Witness platform observes AgentRun topology (from adapters), it can
# retroactively map runs to workflow nodes:
#
# ── Forward mapping (template → runs) ────────────────────────────────────────
# A workflow node with bound_run.match_criteria finds matching AgentRuns:
#   - Query: runs WHERE source=criteria.source AND cwd GLOB criteria.workspace_pattern
#   - Bind: node.bound_run.run_id = matched_run.id
#   - Status sync: node state mirrors run status
#
# ── Reverse mapping (runs → detected workflow) ────────────────────────────────
# TopologyEdge records are translated to workflow structure:
#   - Each AgentRun → one workflow node (type: agent_task)
#   - Each TopologyEdge → one depends_on relationship
#   - SpawnKind maps to edge metadata:
#       'subagent'     → standard depends_on (parent spawned child)
#       'fork'         → parallel branch (siblings share parent)
#       'handoff'      → sequential chain (continuation)
#       'continuation' → same as handoff but same logical task
#
# ── Hybrid reconciliation ─────────────────────────────────────────────────────
# For hybrid workflows, the engine reconciles template with observed reality:
#   1. Template node "run-tests" is running, bound to AgentRun X
#   2. AgentRun X spawns children Y, Z (TopologyEdge)
#   3. If "run-tests" is augmentable → auto-create augmented nodes for Y, Z
#   4. If "run-tests" is NOT augmentable → record as "unplanned children" (warning)
#   5. UI shows both planned structure and actual execution topology
