# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ 5. THREE WORKFLOW MODES                                                     │
# └─────────────────────────────────────────────────────────────────────────────┘

# ══ MODE 1: STATIC ════════════════════════════════════════════════════════════
# Fully defined in YAML. No augmentation. What you write is what runs.
#
# workflow:
#   id: static/simple-build
#   origin: defined
#   nodes:
#     - id: build
#       type: agent_task
#       augmentable: false          # (default; explicit for clarity)
#       ...
#     - id: test
#       type: agent_task
#       depends_on: [build]
#       ...
#     - id: deploy
#       type: agent_task
#       depends_on: [test]
#       ...

# ══ MODE 2: DETECTED ═════════════════════════════════════════════════════════
# No YAML definition exists. Workflow structure is inferred from observed
# AgentRun topology (TopologyEdge records).
#
# When the system observes:
#   - AgentRun A (root, spawnKind: 'root')
#   - AgentRun B (parentRunId: A, spawnKind: 'subagent', spawnReason: 'Task')
#   - AgentRun C (parentRunId: A, spawnKind: 'subagent', spawnReason: 'Task')
#   - AgentRun D (parentRunId: B, spawnKind: 'subagent', spawnReason: 'Task')
#
# It generates a detected workflow:
#
# workflow:
#   id: "detected:claude-code:session-xyz"    # Auto-generated from root run
#   name: "Agent Session xyz"                  # From AgentRun.title or auto
#   origin: detected
#   detected_from:
#     root_run_id: "claude-code:session-xyz"
#     source: claude-code
#     observed_at: 1717689600000
#   nodes:
#     - id: "run:claude-code:session-xyz"
#       type: agent_task
#       label: "Root Task"
#       bound_run:
#         run_id: "claude-code:session-xyz"
#       # Auto-populated from AgentRun:
#       status: completed                      # Mapped from RunStatus
#       started_at: 1717689600000
#       ended_at: 1717689900000
#     - id: "run:claude-code:session-abc"
#       type: agent_task
#       label: "Subagent: Build"
#       depends_on: ["run:claude-code:session-xyz"]
#       bound_run:
#         run_id: "claude-code:session-abc"
#     - id: "run:claude-code:session-def"
#       type: agent_task
#       label: "Subagent: Test"
#       depends_on: ["run:claude-code:session-xyz"]
#       bound_run:
#         run_id: "claude-code:session-def"
#     - id: "run:claude-code:session-ghi"
#       type: agent_task
#       label: "Sub-subagent: Unit Tests"
#       depends_on: ["run:claude-code:session-abc"]
#       bound_run:
#         run_id: "claude-code:session-ghi"
#
# The detected workflow is READ-ONLY (reflects reality, not intent) but can be:
#   - Labeled by user (add names, descriptions)
#   - Saved as a template (convert to hybrid for future use)
#   - Compared to a defined workflow (drift detection)

